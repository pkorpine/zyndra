CONF_VERSION = "2"
MACHINE = "zynq-generic"
DISTRO ?= "poky"
hostname:pn-base-files = "zyndra"
PACKAGE_CLASSES = "package_ipk"
USER_CLASSES ?= "buildstats"
PATCHRESOLVE = "noop"
BB_NUMBER_THREADS ?= "${@oe.utils.cpu_count()}"
PARALLEL_MAKE ?= "-j ${@oe.utils.cpu_count()}"
DL_DIR ?= "${TOPDIR}/../downloads"
SSTATE_DIR ?= "${TOPDIR}/../sstate-cache"
EXTRA_IMAGE_FEATURES = "debug-tweaks"
DISTRO_FEATURES:remove = "x11 wayland vulkan opengl qemu"
QB_SYSTEM_NAME = ""
IMAGE_FSTYPES = "tar.gz cpio.gz cpio.gz.u-boot ext4 wic wic.bmap"
WKS_FILE = "xilinx-default-sd.wks"
IMAGE_BOOT_FILES += "boot.bin"
HDF_URI = "file:///w/hardware_description.xsa"
EXTRA_IMAGEDEPENDS += "virtual/boot-bin virtual/bootloader"
ACCEPT_XILINX_EULA = "1"
XILINX_WITH_ESW = "xsct"
LICENSE_FLAGS_ACCEPTED += "xilinx"
MACHINE_FEATURES:append = " fpga-overlay"
IMAGE_INSTALL:append = " dropbear ethtool fpga-bitstream opkg spi-tools ad9361 ad9361-txrx ad936x-axi ad936x-tcp"
include conf/version.conf

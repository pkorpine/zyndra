# POKY_BBLAYERS_CONF_VERSION is increased each time build/conf/bblayers.conf
# changes incompatibly
POKY_BBLAYERS_CONF_VERSION = "2"

BBPATH = "${TOPDIR}"
BBFILES ?= ""

BBLAYERS ?= " \
  /w/poky/meta \
  /w/poky/meta-poky \
  /w/poky/meta-yocto-bsp \
  /w/meta-arm/meta-arm \
  /w/meta-arm/meta-arm-toolchain \
  /w/meta-xilinx/meta-xilinx-core \
  /w/meta-xilinx/meta-xilinx-standalone \
  /w/meta-xilinx/meta-xilinx-bsp \
  /w/meta-xilinx/meta-microblaze \
  /w/meta-xilinx-tools/ \
  /w/meta-custom \
  "
